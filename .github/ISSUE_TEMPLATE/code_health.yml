name: Code Health
description: Report technical debt, robustness concerns, or code quality improvements
title: "[Code Health] "
labels: ["code health"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for non-urgent issues that improve code robustness, reduce technical debt, or address potential (not yet observed) problems.

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What kind of code health issue is this?
      options:
        - Robustness (potential edge-case failure)
        - Technical Debt (cleanup, refactor)
        - Naming / Consistency
        - Missing Validation
        - Dead Code / Unused Dependencies
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - Host Runtime
        - AICPU Scheduler
        - AICore Executor
        - Ring Buffer
        - TensorMap
        - Orchestration
        - Platform (a2a3 / a2a3sim)
        - Build System
        - Tests
        - Other (please specify in description)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the concern and why it matters
      placeholder: e.g., "Ring advance lock uses spin-wait without deadlock detection timeout"
    validations:
      required: true

  - type: textarea
    id: location
    attributes:
      label: Location
      description: File path(s) and line number(s)
      placeholder: |
        - `src/a2a3/runtime/tensormap_and_ringbuffer/runtime/pto_scheduler.cpp:142`
      render: markdown
    validations:
      required: true

  - type: textarea
    id: proposed_fix
    attributes:
      label: Proposed Fix
      description: How should this be addressed?
      placeholder: Describe the approach or link to relevant patterns in the codebase
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How urgent is this?
      options:
        - Low (no impact today, good to fix eventually)
        - Medium (minor risk, should fix in next few releases)
        - High (significant risk, fix soon)
    validations:
      required: true
