name: NVIDIA Branch Review

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nvidia-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Create local venv
        run: |
          python3 -m venv --system-site-packages .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip pytest

      - name: Run NVIDIA review guard
        run: |
          . .venv/bin/activate
          PYTHONPATH=$PWD:$PWD/python \
            python .agents/checks/check_nvidia_review_ready.py

      - name: Run focused review artifact tests
        run: |
          . .venv/bin/activate
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 PYTHONPATH=$PWD:$PWD/python \
            python -m pytest tests/ut/py/test_nvidia_review_artifacts.py -q

      - name: Compile branch helper scripts
        run: |
          . .venv/bin/activate
          python -m py_compile \
            .agents/checks/check_nvidia_review_ready.py \
            examples/cuda/host_schedule_vector_ops.py \
            examples/cuda/persistent_layered_cross.py
