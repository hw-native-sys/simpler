name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------- Simulation scene tests (debug) ----------
  st-sim-a2a3:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up C++ compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build gdb
          sudo apt-get install -y g++-15 || sudo apt-get install -y g++
          if ! command -v g++-15; then sudo ln -s $(which g++) /usr/local/bin/g++-15; fi

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install numpy
          pip install ml_dtypes
          pip install pytest
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Build nanobind extension
        run: pip install .

      - name: Run simulation examples (a2a3sim)
        run: python ci.py -p a2a3sim -c 882c4db -t 600 --clone-protocol https || true

      - name: Debug via tmate
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true

  st-sim-a5:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up C++ compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build gdb
          sudo apt-get install -y g++-15 || sudo apt-get install -y g++
          if ! command -v g++-15; then sudo ln -s $(which g++) /usr/local/bin/g++-15; fi

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install numpy
          pip install ml_dtypes
          pip install pytest
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Build nanobind extension
        run: pip install .

      - name: Run simulation examples (a5sim)
        run: python ci.py -p a5sim -c 882c4db -t 600 --clone-protocol https || true

      - name: Debug via tmate
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
